<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="vendors/bootstrap.min.css" />
    <title>Authentication Page</title>
  </head>
  <body style="overflow: hidden;">
    <section id="bg-gray-center">
      <section id="logo">
        <div class="logo-box">
          <img src="assets/odin-logo.png" alt="" />
        </div>
      </section>
      <section id="info-box">
        <h1>Giriş</h1>
        <p>
          Odin Project Engineering CRM sistemindən<br />istifadə üçün giriş
          edin.
        </p>
      </section>
      <section id="form-box">
        <form action="">
          <div class="text-center">
            <input class="authinput" type="text" placeholder="İstifadəçi adı" />
            <br />
            <input class="authinput" type="password" placeholder="Şifrə" />
          </div>
          <div class="savepass">
            <input type="checkbox">
            <label for="checkbox">Şifrəni yadda saxla</label>
          </div>
          <div class="form-btn">
            <button>
              Daxil ol
            </button>
          </div>
        </form>
      </section>
    </section>

    <script src="scripts/main.js"></script>
  </body>
</html>
