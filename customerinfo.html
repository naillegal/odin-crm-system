<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

                <i class="fas fa-clipboard-list"></i>

            </a>
            <a href="assistprice.html">
              <div class="tab">
                <i class="fa-solid fa-hand-holding-dollar"></i>
              </div>
            </a>
            <a href="salescontract.html">
