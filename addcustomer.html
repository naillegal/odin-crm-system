<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="vendors/bootstrap.min.css" />
    <title>Authentication Page</title>
  </head>
  <body>
    <section id="bg-gray">
      <section id="addcustomerheader">
        <div>
          <a href="customer.html">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
        </div>
        <div class="d-flex justify-content-center">
          <h5>Yeni müştəri</h5>
        </div>
      </section>
      <section id="addcustomerform">
        <form action="">
          <div>
            <label for="">Ad, Soyad</label>
            <br />
            <input type="text" />
          </div>
          <div>
            <label for="">Əlaqə nömrəsi</label>
            <br />
            <input type="phone" />
          </div>
          <div>
            <label for="">İlkin qiymət təklifi</label>
            <br />
            <input type="text" />
          </div>
          <div>
            <label for="">Maraqlandığı məhsul</label>
            <select id="product" name="product">
              <option value="Blackmirror">Qara şüşə</option>
              <option value="Blackprofile">Qara profil</option>
            </select>
          </div>
          <div class="d-flex onelineinputs">
            <div class="w-50">
              <label for="">Xüsusiyyətlər</label>
              <div>
                <select id="product" name="product">
                  <option value="Blackmirror">Qara şüşə</option>
                  <option value="Blackprofile">Qara profil</option>
                </select>
              </div>
            </div>
            <div class="w-30">
              <label for="">Ölçü</label>
              <br />
              <input type="text" name="" id="" />
            </div>
            <div class="icon-bg w-20">
              <i class="fa-solid fa-plus"></i>
            </div>
          </div>
          <div>
            <label for="">Müraciət vasitəsi</label>
            <select id="appointment" name="appointment">
              <option value="Instagram">Instagram</option>
              <option value="Facebook">Facebook</option>
            </select>
          </div>
          <div>
            <label for="">Ünvan</label>
            <br />
            <input type="text" />
          </div>
          <div>
            <label for="">Geri dönüş tarixi</label>
            <br />
            <input type="date" />
          </div>
          <div class="d-flex justify-content-center">
            <button>Təsdiq et</button>
          </div>
        </form>
      </section>
      <footer>
        <div class="tabs-box">
          <div class="change-tabs d-flex justify-content-between">
            <a href="task.html">
              <div class="tab active">
                <i class="fas fa-clipboard-list"></i>
              </div>
            </a>
            <a href="assistprice.html">
              <div class="tab">
                <i class="fa-solid fa-hand-holding-dollar"></i>
              </div>
            </a>
            <a href="salescontract.html">
              <div class="tab">
                <i class="fas fa-file-signature"></i>
              </div>
            </a>
          </div>
        </div>
      </footer>
    </section>
    <script src="scripts/addcustomer.js"></script>
    <script src="scripts/main.js"></script>
  </body>
</html>
